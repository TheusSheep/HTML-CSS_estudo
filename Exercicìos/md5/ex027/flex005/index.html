<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/media.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <title>Login Responsive</title>
</head>
<body>
    <main>
        <img src="image/login-image.jpg" alt="imagem de uma árvore amarela">
        <section>
            <h1>Login</h1>
                <form action="" method="post">
                    <i class="fa-solid fa-envelope"></i>
                    <label for="cadastro">email:</label>
                    <input type="email" name="cadastro" id="cadastro"
                    required>
                </form>
                <form action="" method="post">
                    <i class="fa-solid fa-lock"></i>
                    <label for="senha">senha:</label>
                    <input type="password" name="senha" id="senha" required>
                </form>
                <form action="" method="post" id="botoes">
                    <button type="submit"><p>Entrar<i class="fa-solid fa-arrow-right"></i></p></button>
                    <button type="reset"><p>Sair<i class="fa-solid fa-xmark"></i></p></button>
                </form>
        </section>
    </main>
</body>
</html>
